# DreamLog Sleep Cycle Experiment Registry
#
# Each experiment has: motivation (why), method (how), key_result (what we found),
# status, date, script, and implications for the project.
#
# This file is the single source of truth for experimental provenance.

experiments:

  # ================================================================
  # CORE COMPRESSION EXPERIMENTS
  # ================================================================

  EX01_iterative_convergence:
    title: "Iterative Dream Cycle Convergence"
    date: 2026-03-29
    script: experiments/iterative_dreaming.py
    status: complete
    motivation: |
      DreamCoder's sleep phase runs until convergence (no more library
      primitives can be extracted). Does our dream cycle converge? How
      many cycles? Is the fixed point unique or path-dependent?
    method: |
      Build a 68-clause KB with family relationships, transitive closures,
      and redundant facts. Run dream() repeatedly, tracking clause count
      after each cycle. Also test with LLM-assisted compression.
    key_result: |
      Converges in exactly 2 cycles (cycle 1 compresses, cycle 2 confirms
      no more opportunities). Tested on 5 different KBs, always 2 cycles.
      With LLM: same convergence speed, but LLM-symbolic cascade achieves
      33% compression on family KB (15->10 clauses) in a single cycle.
    implications: |
      The dream cycle is a contraction mapping on KB size. Single-pass is
      nearly optimal; the second cycle is just verification. This means
      we don't need an iterative loop in production.

  EX02_semantic_drift:
    title: "Semantic Drift Under Repeated Dreaming"
    date: 2026-03-29
    script: experiments/iterative_dreaming.py
    status: complete
    motivation: |
      Compression could change KB behavior: a generalization might over-
      generate (answer queries it shouldn't) or under-generate (lose
      answers). Repeated cycles could accumulate drift. How much behavioral
      change does dreaming introduce?
    method: |
      Before dreaming, generate 200 held-out queries (ground terms) with
      expected True/False answers. After each dream cycle, re-evaluate all
      200 queries. Count changes (false positives and false negatives).
    key_result: |
      0% drift across all 200 queries, across all dream cycles. Zero false
      positives, zero false negatives. The verification suite with positive
      and negative queries prevents any behavioral change.
    implications: |
      The dream cycle is behavior-preserving by construction (verification
      + rollback). This is a strong safety guarantee for production use.
      The held-out query methodology could be formalized as a test.

  EX03_dreamcoder_list_domain:
    title: "DreamCoder List Domain Benchmark"
    date: 2026-03-29
    script: experiments/dreamcoder_benchmark.py
    status: complete
    motivation: |
      DreamCoder's flagship result is discovering library primitives like
      map, fold, filter from list-processing tasks. Can our sleep cycle
      discover equivalent abstractions from logic programs encoding the
      same list operations?
    method: |
      Encode 11 list operations (member, append, reverse, length, last,
      sum_list, map_succ, map_double, all_positive, all_even, all_nonzero)
      as Prolog rules using cons/nil representation. Run the sleep cycle.
    key_result: |
      The system discovers forall/2:
        _invented_0(R, nil).
        _invented_0(R, cons(X, Xs)) :- call(R, X), _invented_0(R, Xs).
      This is the logic programming equivalent of DreamCoder's "every"
      combinator. It compressed all_positive, all_even, all_nonzero into
      wrappers around a single parameterized predicate. 36->33 clauses.
    implications: |
      DreamCoder's key discovery reproduces in our framework. The mechanism
      (skeleton-based structural matching + call/N parameterization) is
      the logic programming equivalent of lambda abstraction + application.
      This validates the architectural analogy between the two systems.

  EX04_derivation_trees:
    title: "Proof Tree Recording and Common Subtree Detection"
    date: 2026-03-29
    script: experiments/dreamcoder_benchmark.py  # inline test
    status: complete
    motivation: |
      DreamCoder compresses derivation traces (programs that solved tasks).
      Static KB analysis (Operations D/E) finds structural patterns in rule
      definitions. Derivation trees capture what actually happens during
      resolution. Can dynamic analysis find patterns that static misses?
    method: |
      Instrument the evaluator to record full proof trees (ProofNode with
      goal, clause, children). Run diverse ancestor queries on a chain KB.
      Analyze proof logs for common structural subtrees.
    key_result: |
      The 2-hop ancestor derivation pattern (ancestor via parent + ancestor
      via parent) appears 8 times across 8 queries. This matches what Op E
      found statically (the grandparent body prefix). Dynamic and static
      analysis converge on the same patterns for this KB.
    implications: |
      For well-structured KBs, static analysis suffices. Dynamic analysis
      would add value for KBs where the structure doesn't reveal usage
      patterns (e.g., rules that exist but are rarely used together).
      The proof tree infrastructure enables future work on proof-guided
      compression.

  # ================================================================
  # LLM-ASSISTED EXPERIMENTS
  # ================================================================

  EX05_llm_family_kb:
    title: "LLM-Assisted Cross-Functor Rule Discovery"
    date: 2026-03-28
    script: experiments/llm_sleep_cycle.py
    status: complete
    motivation: |
      Symbolic operations cannot discover rules that cross functor
      boundaries (e.g., father(X,Y) :- parent(X,Y), male(X)) because
      anti-unification works within a single predicate. Can an LLM
      see these cross-functor relationships?
    method: |
      Family KB with parent, male, female, father, mother facts. Run
      dream cycle with LLM client (phi4-mini). Op G prompts the LLM
      with KB facts and asks for rules. Validate proposed rules against
      the verification suite.
    key_result: |
      phi4-mini discovered:
        father(X, Y) :- parent(X, Y), male(X).
        mother(X, Y) :- parent(X, Y), female(X).
      Post-OpG pruning removed 8 now-derivable facts. 42->36 clauses
      (14% improvement over symbolic-only). However, results are non-
      deterministic: same model sometimes proposes nothing.
    implications: |
      LLM-assisted compression fills a genuine gap (cross-functor
      conjunctive rules). The verification framework prevents bad rules
      from being accepted. Non-determinism is a challenge for
      reproducibility; ensemble methods might help.

  EX06_llm_multi_domain:
    title: "LLM Compression Across Knowledge Domains"
    date: 2026-03-28
    script: experiments/llm_multi_domain.py
    status: complete
    motivation: |
      Does LLM-assisted compression generalize across domains, or is the
      family KB result a special case? Test on biology (taxonomy), geography
      (countries), university (courses), and cooking (recipes).
    method: |
      4 domain KBs with derivable relationships (warm_blooded from class,
      english_speaking from language, stem_student from enrollment, vegan
      from ingredients). Run with phi4-mini and qwen3:8b.
    key_result: |
      LLM added zero value across all 4 domains. Symbolic Op C preempts
      the LLM by finding guard-based generalizations (e.g., warm_blooded(X)
      :- animal(X), not(exception...)) before Op G runs. The LLM's more
      precise rules (warm_blooded :- mammal OR bird) are blocked because
      the facts are already compressed.
    implications: |
      Operation ordering matters: C before G means symbolic generalizations
      preempt LLM discoveries. The LLM is most valuable when Op C can't
      compress (no guard predicate, or cross-functor patterns). Future work:
      run LLM first for some domains?

  EX07_llm_model_comparison:
    title: "LLM Model Quality vs Rule Discovery"
    date: 2026-03-29
    script: experiments/llm_sleep_cycle.py  # various --model flags
    status: complete
    motivation: |
      Different LLM models vary in reasoning capability, JSON formatting
      compliance, and tendency to hallucinate. Which models produce the
      best rules for knowledge compression?
    method: |
      Same family + graph KBs across phi4-mini, phi4, qwen3:8b, llama3.2,
      gpt-oss. Compare: JSON validity, rule correctness, variable usage
      (generalized vs ground), and compression achieved.
    key_result: |
      - phi4-mini: Best balance of speed + quality. Discovers father/mother.
      - phi4 (14B): Finds parent(X,Y) :- father(X,Y) (reversed direction).
      - qwen3:8b: Finds path(X,Y) :- edge(X,Y). Needs <think> tag stripping.
      - llama3.2: Produces GROUND rules (one per fact), all rejected by MDL.
      - gpt-oss (120B): Perfect JSON, perfect rules, but very slow.
    implications: |
      Model size matters for generalization quality. Small models produce
      ground instances; medium models produce generalized rules; large
      models produce perfect output but are slow. The 4-8B parameter range
      is the sweet spot for this task.

  # ================================================================
  # ABLATION AND SCALING
  # ================================================================

  EX08_ablation:
    title: "Operation Ablation Study"
    date: 2026-03-30
    script: experiments/ablation_and_scale.py --experiment ablation
    status: complete
    motivation: |
      With 8 operations (A-H), which ones contribute the most to
      compression? Are any operations redundant or counterproductive?
    method: |
      119-clause KB with all pattern types. Run dream() 8 times, each
      time disabling one operation via monkey-patching. Compare clause
      count to full-pipeline baseline.
    key_result: |
      Op C (fact generalization): 85% of compression (11 of 13 clauses)
      Op B (pruning): 15% (2 clauses)
      Op D (invention): 15% (2 clauses)
      Op E (extraction): -15% (INCREASES clause count by 2 when disabled!)
      Op A, F, H: 0% impact on this KB
    implications: |
      Op C is the workhorse. Op E is counterproductive on clause-count
      MDL (adds a clause for structural simplification). Op A and F don't
      fire on this KB (no subsumed rules, no dead clauses). For a minimal
      deployment, Op C alone captures most of the value.

  EX09_scaling:
    title: "Compression Scaling with KB Size"
    date: 2026-03-30
    script: experiments/ablation_and_scale.py --experiment scale
    status: complete
    motivation: |
      Does compression quality degrade with KB size? Does the system
      become too slow for practical KBs? What's the scaling law?
    method: |
      Generate KBs from 69 to 1019 clauses (10 to 200 entities). Same
      structural patterns at every scale. Measure compression ratio, time,
      and throughput (clauses/second).
    key_result: |
      Compression ratio: stable at 0.88 across all sizes.
      Operation count: constant at 6 (same patterns, same discoveries).
      Throughput: 75 cl/s (n=10) -> 12 cl/s (n=200).
      Bottleneck: verification queries on transitive closures (O(n) per
      query, O(n) queries = O(n^2) total).
    implications: |
      Compression quality is size-independent (good). Performance is
      O(n^2) due to verification (bad for n>1000). Optimization: sample
      verification queries instead of exhaustive checking, or cache
      intermediate resolution results.

  EX10_wake_sleep_loop:
    title: "Full Wake-Sleep Loop: Query Performance Improvement"
    date: 2026-03-30
    script: experiments/ablation_and_scale.py --experiment wake_sleep
    status: complete
    motivation: |
      The theoretical claim is that sleeping improves waking performance.
      Does dreaming actually make queries faster? By how much?
    method: |
      132-clause KB. Wake phase: run 15 queries 5 times each with
      derivation tracking. Dream phase: compress KB (Op H caches lemma
      facts from derivation log). Re-run same 15 queries. Compare times.
    key_result: |
      Query time: 25.0ms -> 1.1ms (23.6x speedup).
      Mechanism: Op H cached 15 lemma facts (frequently-derived terms).
      Queries that required multi-step recursive resolution now resolve
      via direct fact lookup. Correctness fully preserved (15/15 queries).
    implications: |
      The wake-sleep loop delivers real performance gains. Lemma caching
      (memoization during sleep) is the key mechanism. This is analogous
      to how biological sleep consolidates memories: frequently-accessed
      patterns become cached for faster retrieval.

  # ================================================================
  # PLANNED EXPERIMENTS
  # ================================================================

  EX11_noise_tolerance:
    title: "Compression Under Noisy Data"
    date: 2026-03-31
    script: experiments/noise_and_ordering.py --experiment noise
    status: complete
    motivation: |
      Real-world KBs contain errors: incorrect facts, contradictory rules,
      stale data. How robust is the sleep cycle to noise? Does it amplify
      errors (by generalizing from wrong data) or suppress them (by
      identifying anomalies)?
    method: |
      36-clause clean family KB. Inject 0-50% random incorrect facts
      (wrong gender, impossible parents, random preferences). Run dream
      cycle at each noise level. Track: compression ratio, whether noisy
      facts got generalized, and correctness on known-true/false queries.
    key_result: |
      0-20% noise: ROBUST. Noisy facts left as isolated facts, not
      generalized. Compression ratio 0.86-0.87, all checks pass.
      30%+ noise: AMPLIFIES ERRORS. Enough noisy facts share patterns
      (e.g., multiple random likes(person, spinach)) that Op C generalizes
      them into a rule. Correctness still passes (known queries unaffected)
      but the KB now contains generalized garbage.
    implications: |
      The system is robust to moderate noise (<20%). At high noise levels,
      the guard-based generalization treats noise as signal. Mitigation:
      require higher min_group_size for noisy domains, or use LLM-as-judge
      to validate generalizations before applying.

  EX12_real_world_ontology:
    title: "Compression on Real-World-Style Knowledge"
    date: 2026-03-31
    script: experiments/real_world_kb.py
    status: complete
    motivation: |
      All previous experiments use synthetic KBs with known structure.
      Does the sleep cycle discover meaningful abstractions in real-world-
      style knowledge (genealogy, geography, curriculum)?
    method: |
      Three domains: (1) Biblical genealogy (79 clauses, 4 generations),
      (2) World geography (129 clauses, 15 countries), (3) University
      curriculum (97 clauses, 14 courses with prerequisites). Run full
      pipeline on each.
    key_result: |
      Genealogy: 79->75 (5% compression). Op C generalized one pattern.
      Geography: 129->99 (23% compression). Op C found 5 generalizations
        (english_speaking, developed, northern, etc.).
      Curriculum: 97->78 (20% compression). Op C generalized stem_course
        and advanced_course. Op D discovered transitive closure from 3
        prerequisite traversal predicates (requires/depends_on/needs_first).
      Total: 305->252 (17% compression), all correctness checks pass.
    implications: |
      The system works on realistic data structures. Op C is the primary
      compressor on property-based KBs. Op D fires when multiple transitive
      closures exist (curriculum prerequisites). Geography is the richest
      domain because it has many derivable property predicates with shared
      guard predicates.

  EX13_operation_ordering:
    title: "Sensitivity to Operation Ordering"
    date: 2026-03-31
    script: experiments/noise_and_ordering.py --experiment ordering
    status: complete
    motivation: |
      Operations run in fixed order A->B->C->D->E->F->G->H. EX06 showed
      that C preempts G. Would different orderings produce better results?
      Is there a principled way to choose the order?
    method: |
      119-clause KB. Run all 6 permutations of {C, D, E} with A and B
      always first (cleanup) and F, H always last (post-processing).
    key_result: |
      ALL 6 orderings produce exactly 106 clauses. Order does not matter
      for C, D, E on this KB. The operations are sufficiently independent
      that their compression targets don't overlap.
    implications: |
      For well-structured KBs, operation ordering is irrelevant. The
      preemption issue (C before G) is specific to LLM-assisted ops, not
      to the symbolic pipeline. The fixed ordering A-H is safe.

  EX14_haiku_vs_local:
    title: "Cloud LLM (Haiku) vs Local Models for Rule Discovery"
    date: 2026-03-31
    script: experiments/llm_sleep_cycle.py  # --provider anthropic
    status: complete
    motivation: |
      EX07 showed local models (phi4-mini, qwen3:8b) vary widely in rule
      quality. Claude Haiku 4.5 is fast, cheap ($0.25/M input), and
      purpose-built for structured output. Does a cloud API model produce
      better rules than local models?
    method: |
      Same family KB (42 clauses) and multi-domain KBs (273 clauses total).
      Replaced Ollama/phi4-mini with Anthropic Haiku via new --provider
      anthropic --api-key-env MY_ANTHROPIC_API_KEY flags. Also required
      adding evaluator call limits (max_total_calls) because Haiku's
      thoroughness created combinatorial explosion.
    key_result: |
      Family KB: Haiku discovered 6 rules (vs phi4-mini's 2).
        father(X,Y) :- parent(X,Y), male(X).     [same as phi4-mini]
        mother(X,Y) :- parent(X,Y), female(X).    [same as phi4-mini]
        parent(X,Y) :- father(X,Y).               [new: reverse inference]
        parent(X,Y) :- mother(X,Y).               [new: reverse inference]
        male(X) :- father(X,Y).                   [new: property inference]
        female(X) :- mother(X,Y).                 [new: property inference]
      42->38 clauses (10% compression, vs phi4-mini's 14% on some runs).
      Post-OpG pruning removed 8 now-derivable facts.
      Multi-domain: Haiku found 2 rules in cooking domain:
        vegan_recipe(X) :- uses(X,Y), vegan(Y,true).
        contains_dairy(X) :- uses(X,Y), type(Y,dairy).
      This is +2 clauses better than symbolic-only. However, vegan_recipe
      rule is semantically wrong (checks ONE ingredient, not ALL), causing
      a false positive on cake. Other 3 domains: Haiku matched symbolic.
      JSON quality: perfect. No markdown fences, no formatting errors.
      Deterministic: Haiku produces consistent output across runs.
    implications: |
      Haiku is strictly better than local models for rule discovery: more
      rules, better JSON, deterministic. BUT its thoroughness creates a
      new engineering challenge: bidirectional rules (A←B and B←A) create
      resolution loops that blow up the evaluator. Required adding
      max_total_calls to PrologEvaluator and bounded verification in Op G
      and post-Op-G pruning. The vegan_recipe false positive shows that
      existential vs universal quantification remains a challenge for LLMs
      (the rule checks "exists vegan ingredient" not "all ingredients vegan").

  EX15_prompt_engineering:
    title: "Prompt Engineering for Op G Rule Quality"
    date: 2026-03-31
    script: experiments/ex16_prompt_and_filter.py
    status: complete
    motivation: |
      EX14 showed Haiku proposes bidirectional rules (parent←father AND
      father←parent+male) creating resolution loops, and existential rules
      where universal is needed (vegan_recipe). Can prompt engineering fix
      these systematic errors?
    method: |
      EX16: Test 3 prompt variants (baseline, anti-bidirectional, hierarchy-
      aware) on family KB. Measure bidirectional pair count and eval time.
      EX17: Implement dependency-graph cycle filter. Test on clean/bidir/
      indirect/self-recursive cases. Compare filtered vs unfiltered baseline.
      EX18: Test quantifier-aware prompt on cooking KB (baseline vs prompt
      that warns about existential-when-universal-needed patterns).
    key_result: |
      EX16: Anti-bidirectional prompt eliminated ALL reverse rules. Baseline
      produced 21 rules (9 bidirectional pairs), anti-bidir produced exactly
      2 clean rules (father, mother). Eval time: 0.003s vs 0.025s.
      EX17: Cycle filter correctly rejected 4 reverse rules from baseline,
      allowing 0 self-recursive rules to be incorrectly rejected.
      EX18: Quantifier-aware prompt made Haiku use negation-as-failure for
      vegan_recipe, but the rule format wasn't parseable by Op G's JSON
      parser. The standard prompt still produces the existential bug.
      EX19 integration (improved prompt + cycle filter on all 4 domains):
        Biology:    77->64 (3 LLM rules, +3 over symbolic). pet(wolf) FP.
        Geography:  64->49 (2 LLM rules: american_country). ALL PASS.
        University: 71->48 (1 LLM rule + 13 pruned). ALL PASS.
        Cooking:    61->50 (2 LLM rules). vegan_recipe(cake) FP persists.
        TOTAL:      273->211 (0.77 ratio). +20 over symbolic (was +2 in EX14).
      Full dream time: ~2s per KB (was 29s for family KB in EX14). 14x faster.
    implications: |
      Prompt engineering is the highest-leverage fix. Anti-bidirectional
      guidance eliminates 95% of problematic rules. Combined with the cycle
      filter as safety net, Op G now runs in seconds instead of minutes.
      The existential-vs-universal quantification issue remains unsolved at
      the prompt level (NAF syntax isn't parseable). Needs parser support
      for negation in LLM-proposed rules, or a semantic false-positive
      detector. The university enrolled(X,Y) :- student(X), course(Y) case
      shows that syntactic correctness doesn't guarantee semantic correctness
      when the data happens to be complete.

  EX16_multi_cycle_llm:
    title: "LLM Discoveries Across Multiple Dream Cycles"
    date: null
    script: null
    status: planned
    depends_on: EX15
    motivation: |
      In EX01, the LLM-symbolic cascade worked within one cycle. But what
      if cycle 1's LLM discoveries create patterns that cycle 2's symbolic
      ops can further compress? What if cycle 2's compressions reveal new
      cross-functor patterns for cycle 3's LLM?
    method: |
      Design a KB where this cascade should occur. Run iterative dreaming
      with LLM. Track whether each cycle's discoveries enable the next.
    key_result: null
    implications: null

  # ================================================================
  # LONG-LIVED ACCUMULATION EXPERIMENTS
  # ================================================================

  EX23_simulated_long_lived:
    title: "Simulated Long-Lived Knowledge Accumulation"
    date: 2026-04-07
    script: experiments/ex23_simulated_long_lived.py
    status: complete
    depends_on: [EX15, EX22]
    motivation: |
      Previous experiments tested compression on static KBs. A real user
      builds knowledge incrementally over sessions — asserting facts,
      querying, and periodically dreaming. We need to show the
      learning-over-time story: does the system discover patterns as
      data accumulates? Does compression compound or plateau?
    method: |
      Simulate a developer using DreamLog to track their project ecosystem
      over 10 sessions. Each session adds facts about teams, languages,
      repos, dependencies, code reviews, incidents, and mentorship.
      Dream every 3 sessions (Anthropic Haiku for Op G). Track KB size,
      rule count, and compression ratio per dream cycle. Run 6 correctness
      spot-checks including transitive closure.
    key_result: |
      KB grew from 0 to 120 clauses (109 facts, 11 rules) across 10
      sessions with 121 total assertions. Key findings:
      - Dream 1 (session 3, 45 clauses): discovered 7 rules including
        knows_repo_language, senior_developer, backend_team_member.
        KB *expanded* to 49 (ratio 1.09) — investing in structure.
      - Dream 2 (session 6, 85 clauses): discovered 2 rules (team←backend_dev,
        backend_dev definition), pruned 5 facts. First net compression (0.94).
      - Dream 3 (session 9, 113 clauses): no new patterns. Saturation.
      - Final dream: no change. KB fully compressed.
      - All 6 correctness checks passed (including transitive depends_on).
      - Total LLM cost: $0.006 (4 Haiku calls).
    implications: |
      The system exhibits the desired learning-over-time behavior: early
      dreams discover structure (even at the cost of expanding the KB),
      middle dreams compress as symbolic ops capitalize on discovered
      rules, and late dreams reach saturation — matching DreamCoder's
      convergence behavior. The transitive closure and negation-as-failure
      rules survived all compression cycles intact. Fixed a latent bug
      in KnowledgeStore.query() — missing max_total_calls caused infinite
      loops when post-dream rules created resolution branching.

  EX24_organic_research_lab:
    title: "Organic Research Lab Knowledge Graph"
    date: 2026-04-08
    script: experiments/ex24_research_lab.py
    status: complete
    depends_on: [EX23]
    motivation: |
      EX23 was a clean proof-of-concept but used shallow, regular predicates
      with predictable growth. A genuine stress test needs: multiple
      interacting domains, irregular growth, corrections mid-stream,
      multi-hop reasoning chains, and patterns that only emerge at scale.
      This experiment simulates a PI building institutional memory across
      seven domains over 25 sessions with 443 assertions and 78 predicates.
    method: |
      Simulate Dr. Chen's research lab over 25 sessions spanning two years.
      Seven domains: people, publications, teaching, grants, infrastructure,
      collaborations, service. Sessions vary from 5-30 assertions. Session 10
      includes corrections (postdoc leaves, student role changes). Session 17
      has user-provided rules with NAF helper predicates. Dream every 5
      sessions with Anthropic Haiku for Op G. 13 correctness spot-checks
      including multi-hop transitive citation, NAF-based active membership,
      and negative examples.
    key_result: |
      Final KB: 451 clauses (422 facts, 29 rules) from 443 assertions.
      Phase transitions visible in timeline:
      - Dream 1 (S05, 94 cls): 2 symbolic rules, compressed to 91 (0.97)
      - Dream 2 (S10, 179 cls): LLM discovers 17 cross-domain rules,
        KB *expands* to 195 (1.09). Rules include grant_funded_work,
        cross_institution_collaboration (4-body with NAF), mentorship_chain.
      - Dream 3 (S15, 278 cls): 2 symbolic rules, compressed to 275 (0.99)
      - Dreams 4-5 (S20, S25): saturation, minor pruning only.
      - Final dream: no change (fully compressed).
      29 rules from 3 sources: 4 symbolic (Op C), 17 LLM (Op G), 8 user.
      All 13 correctness checks pass including transitive citation,
      NAF-based active_member, and senior_student via has_passed_quals helper.
      Total LLM cost: $0.023 (6 Haiku calls).
    implications: |
      Validates the system at realistic scale (78 predicates, 443 facts).
      Key findings: (1) LLM cross-domain rule discovery is the primary
      value-add — symbolic ops handle regularities but can't cross domain
      boundaries. (2) The "invest then compress" pattern is robust: early
      dreams expand the KB with structural rules, later dreams compress.
      (3) User-provided rules with NAF helpers coexist with discovered rules.
      (4) Saturation occurs consistently after 2-3 dream cycles.
      Also surfaced and fixed 3 bugs in kb_dreamer.py around mixed-type
      atom values (numeric literals in sorted() calls and str.join()).

  # ================================================================
  # GENERALIZATION EXPERIMENTS
  # ================================================================

  EX25_generalization:
    title: "Compression Predicts Generalization"
    date: 2026-04-08
    script: experiments/ex25_generalization.py
    status: complete
    depends_on: [EX23, EX24]
    motivation: |
      The core theoretical claim is that compression = learning (Solomonoff
      induction). All prior experiments verified deductive closure preservation
      — the compressed KB answers the same queries. But the thesis claims
      something stronger: compression discovers CONCEPTS that generalize to
      unseen data. We test this directly.
    method: |
      Four components on a 4-generation family tree (29 people, 96 base
      facts, 204 derived facts across 7 predicates):

      A. Zero-shot generalization: dream on full KB, add 6 unseen people with
         only base facts (person, male/female, parent), check if derived
         relationships (father, mother, grandparent, etc.) are derivable.
      B. Holdout: stratified 80/20 split of derived facts, dream on training
         set, measure recovery rate on held-out facts.
      C. Ablation: no-dream vs symbolic-only vs full pipeline (3 random seeds).
      D. Transfer: dream on family+org combined (org is isomorphic hierarchy),
         check if cross-domain patterns emerge.
    key_result: |
      THE MONEY RESULT: New-entity recall goes from 0% to 80%.

      Part A (generalization):
        No dream:      Acc=29%, Recall=0%, 0 rules
        Symbolic only: Acc=29%, Recall=0%, 1 rule (entity-specific)
        Full pipeline:  Acc=86%, Recall=80%, Precision=100%, 7 rules
        KB compressed from 300→184 clauses (ratio 0.613).
        Discovered: father←parent+male, mother←parent+female,
        grandparent←parent∘parent, grandfather←grandparent+male,
        grandmother←grandparent+female.
        Only ancestor (requires recursive rule) was not recovered.

      Part B (holdout): 0% recovery across all conditions. The 80/20 split
        removes too many facts for pattern discovery — minimum data threshold
        exists but was not met per-predicate.

      Part C (ablation): Symbolic ops discover only entity-specific rules
        (e.g., "albert is ancestor of everyone"). Cross-predicate concepts
        require LLM (Op G). Night-and-day difference: 0% vs 80% recall.

      Part D (transfer): Combined KB discovered 10 rules vs 3 isolated.
        Family generalization: 6/6 in combined mode. The larger context
        helps the LLM see more patterns.

      Total LLM cost: $0.015 (6 Haiku calls).
    implications: |
      Validates the Solomonoff thesis empirically: compression discovers
      concepts that generalize to unseen entities. The compressed KB can
      classify new people it has never seen.

      Key insight: symbolic compression alone cannot cross predicate
      boundaries — it discovers entity-specific patterns ("albert is
      ancestor of everyone") but not conceptual rules ("father = male
      parent"). The LLM is essential for cross-predicate generalization.

      Surfaced and fixed two critical bugs:
      1. Verification suite shared one evaluator across all positive queries,
         causing max_total_calls to be exhausted by early transitive queries
         and rejecting all subsequent rules. Fixed: per-query evaluators.
      2. Op G max_total_calls was hardcoded at 500, insufficient for large
         KBs with transitive predicates. Fixed: scale with KB size.
      3. max_prompt_facts (formerly hardcoded at 50) made configurable via
         KnowledgeBaseDreamer constructor — crucial for KBs with many
         predicates where round-robin sampling must cover enough of each.

  EX25b_novel_generalization:
    title: "Novel Domain Generalization (Synthetic Crafting)"
    date: 2026-04-08
    script: experiments/ex25b_novel_generalization.py
    status: complete
    depends_on: [EX25]
    motivation: |
      EX25's family tree is the canonical Prolog example — Haiku has likely
      seen father(X,Y) :- parent(X,Y), male(X) thousands of times in training.
      We cannot distinguish compression-driven discovery from training data
      recall. This experiment uses a synthetic crafting/alchemy domain with
      invented material names (lumite, vexal, drossite) that the LLM has
      never encountered, forcing genuine pattern discovery from data structure.
    method: |
      Crafting domain: 15 invented materials with properties (phase, class,
      hazard), 16 recipes, 9 artisans with skills, 5 skill requirements.
      112 base facts, 61 derived facts across 6 predicates (hazardous_recipe,
      safe_recipe, same_phase_recipe, metallic_alloy, can_craft, master_artisan).
      Run generalization test: dream on full KB, add unseen materials/artisan,
      check 9 derived facts (6 positive, 3 negative). Compare against family
      tree as canonical baseline.
    key_result: |
      Novel domain recall: 0% → 50% (symbolic) → 67% (full pipeline).
      Canonical baseline: 0% → 0% (symbolic) → 80% (full pipeline).

      Crafting domain (novel, invented terms):
        No dream:  Acc=33%, Recall=0%,  Rules=0
        Symbolic:  Acc=56%, Recall=50%, Precision=75%, Rules=5
        Full:      Acc=67%, Recall=67%, Precision=80%, Rules=16

      Key rules discovered:
      - master_artisan(X) :- artisan(X), not(exception...) [symbolic Op C]
      - safe_recipe(X) :- product(X), not(exception...) [symbolic Op C]
      - hazardous_recipe via LLM cross-predicate pattern [Op G]
      - volatile_material, metallic_material concepts [Op G]

      Undiscovered: can_craft(Artisan, Product) requires 3-hop join
      (artisan→skill→requires_skill→recipe_type) — beyond current reach.

      One principled false positive: same_phase_recipe generalized to new
      product that is the exception (liquid+solid mix).
    implications: |
      STRONGEST VALIDATION OF THE THESIS: symbolic compression alone achieves
      50% recall on a domain with invented terms the LLM has never seen.
      Op C discovers real concepts (master_artisan, safe_recipe) purely from
      MDL-driven fact generalization — no prior knowledge, no training data.

      The family tree's higher recall (80% vs 67%) may be partially inflated
      by training data memorization. The crafting result is the more honest
      measure of compression-driven learning.

      Limitation: rules requiring 3+ hop joins (can_craft) are not
      discoverable by current operations. Future work could address this
      with deeper anti-unification or chain extraction.

      Total LLM cost: $0.006 (2 Haiku calls).

  EX25c_holdout_sweep:
    title: "Holdout Sweep and Open-World Verification"
    date: 2026-04-09
    script: experiments/ex25c_holdout_sweep.py
    status: complete
    depends_on: [EX25]
    motivation: |
      EX25's original holdout result (0% recovery at 20%) was buried in
      the limitations section and poorly understood. This experiment
      sweeps the holdout ratio from 5% to 50% on the family tree domain,
      and diagnoses the root cause: Op G's closed-world false-positive
      check rejects rules that derive held-out facts, because the check
      correctly interprets them as "facts absent from the KB." The check
      is correct for compression on a complete KB but pathological for
      holdout evaluation, where the goal is precisely to recover absent
      facts.
    method: |
      Added an `open_world` parameter (default False) to
      KnowledgeBaseDreamer that gates the Op G false-positive check.
      In open-world mode, rules that cover existing facts and pass
      the verification suite are accepted regardless of whether they
      also derive novel ground terms. Ran the sweep in both modes
      across 5 ratios and 3 seeds.
    key_result: |
      Closed-world (default): 0% recovery at every ratio. The FP check
      rejects all cross-predicate rules as soon as any fact is held out.

      Open-world: 100% / 100% / 100% / 85 +/- 21% / 72 +/- 20% at
      5% / 10% / 20% / 30% / 50% holdout respectively. The transition
      begins at 30%, matching the min_group_size=3 constraint of Op C.
      Zero false positives in either mode.

      KB compression is even stronger with holdout: at 5% the train KB
      compresses from 290 to 118 clauses (ratio 0.405), vs 0.613 for
      the no-holdout EX25 setting. Less data = more compression
      pressure = stronger rule discovery.
    implications: |
      Closed-world is the right default for production (strong safety
      guarantee, zero semantic drift). Open-world is the opt-in mode
      for ILP-style holdout benchmarks where closed-world assumption
      is not part of the protocol. Both modes coexist cleanly; the
      only code change is a single `if not self.open_world:` gate
      around the FP check in _llm_compress.

      Reframes a previously buried limitation as a methodological
      contribution: the paper now explicitly documents the two modes
      and shows both results.

  # ================================================================
  # BASELINE COMPARISONS
  # ================================================================

  EX26_popper_baseline:
    title: "Popper ILP Baseline on EX25/EX25b Generalization Protocol"
    date: 2026-05-11
    script: experiments/ex26_popper_baseline.py
    status: complete
    depends_on: [EX25, EX25b, EX25c]
    motivation: |
      The paper's central claim is that compression (DreamLog) discovers
      generalizable rules without supervision. To position this against
      established ILP, we need a head-to-head baseline against Popper
      (Cropper & Morel 2021) — the modern reference ILP system based on
      learning-from-failures. The state.md flags this as the only remaining
      hard blocker before NeSy 2026 venue submission.

      A naive comparison would advantage one system or the other unfairly
      because Popper is supervised (needs E+, E-, modes, bias) while
      DreamLog is unsupervised (compression-driven, MDL-guided). The
      design here gives each system the natural form of its required
      inputs and evaluates both on the same held-out facts.

      The most discriminating test is EX25b (crafting, invented vocabulary).
      DreamLog symbolic-only achieves 50% recall there with no LLM and no
      labels. If Popper with closed-world-sampled negatives matches that,
      it argues the symbolic strategies converge. If Popper underperforms,
      it argues MDL+verification is doing work that learning-from-failures
      isn't capturing.

    method: |
      Apples-to-apples comparison on EX25 family and EX25b crafting
      domains. Popper given:
        - bk.pl: same KB as DreamLog (base facts + any user-provided rules)
        - exs.pl positive: held-in derived facts for the target predicate
        - exs.pl negative: closed-world random sample, |E-| = |E+|, same
          seed as the holdout split
        - bias.pl: hand-written mode declarations from the natural schema
          per domain, committed BEFORE running (no post-hoc tuning)

      Cross-product:
        systems x {dreamlog-no-dream, dreamlog-symbolic, dreamlog-full,
                   popper, raw-llm-baseline}
        domain  x {family, crafting}
        seeds   x {42, 43, 44}
        holdout x {0%}                    # primary
                  {20%, 50%} x H3 only    # optional data-efficiency

      Per cell: 5-minute timeout. Failure cases (timeout, parse error,
      Popper crash) reported honestly as 0 rules / N/A recall.

      Analysis: bootstrap 95% CIs on recall (B=1000); Bonferroni-corrected
      pairwise comparisons across systems within each domain.

      Reproducibility: pin Popper commit hash, persist all generated
      bk.pl/exs.pl/bias.pl per cell, ship requirements-popper.txt.

    success_criteria: |
      H1 (canonical-domain bracket): Popper family recall in [40%, 85%]
        with CI overlap to at least one DreamLog condition.
      H2 (novel-domain parity): |Popper crafting recall - 50%| <= 15pp
        AND discovered rules structurally overlap with DreamLog symbolic's
        master_artisan / safe_recipe.
      H3 (optional): Popper recall + 1SD < DreamLog open-world recall at
        50% holdout.
      Smoke test: at least one cell produces >=1 valid rule end-to-end.

      Honesty floor: if Popper outperforms DreamLog full on both domains,
      report as-is and revise the paper's positioning.

    pitfalls_addressed: |
      - Mode declarations hand-written, committed before running, not
        tuned after seeing results.
      - Multiple comparisons: 16 pairwise tests -> Bonferroni alpha' =
        0.003125; use bootstrap CIs as primary comparator.
      - 5-minute timeout per cell prevents Popper from "winning by
        slowness."
      - Negative sampling uses the same seed as the holdout split so the
        partition is fully determined.
      - Popper output parser tested against Popper's included `trains`
        example before running on our domains.

    setup_required: |
      Done 2026-05-09. State of the install:
        SWI-Prolog 10.0.2 (system, /usr/bin/swipl)
        clingo 5.8.0 (pip, self-contained; apt has no clingo on Ubuntu 24.04)
        janus-swi, pysat, bitarray, popper (all pip)
        Popper commit pinned: af39e522cb54a55d231a36dd0e4762d347e70f22
        Pin file: experiments/data/popper/POPPER_COMMIT.txt
      Note: Popper@main pyproject.toml declares Python>=3.14; we installed with
        --ignore-requires-python because the actual code runs on 3.12. If a
        future Popper version uses 3.14 features for real, this will surface.
      Smoke test: discovered grandparent rule on a 3-fact KB in 0.9s with
        perfect classification. Stack verified end-to-end.

    api_notes: |
      Confirmed via smoke test:
        from popper.loop import popper
        from popper.util import Settings, format_prog
        settings = Settings(bk_file=..., ex_file=..., bias_file=...,
                            timeout=300, verbosity=0)
        prog, score = popper(settings)   # NOTE: 2 values, not 3
      Popper still prints progress to stdout even with verbosity=0; the EX26
      script should capture stdout via subprocess or stream redirection if
      clean logs are needed.
      prog is frozenset[ (head_lit, body_frozenset) ] where each Literal has
      .predicate (str) and .arguments (tuple of int variable indices). Use
      popper_program_to_rules() in ex26 script to convert directly to
      DreamLog Rule objects (don't parse the str() representation).

    key_result: |
      24 cells: 4 systems x 2 domains x 3 seeds, all completed.
      Total wall time ~3-4 min, LLM cost ~$0.03 (6 Haiku calls).

      FAMILY DOMAIN (canonical 4-gen tree):
        system            recall    precision  accuracy  rules
        no-dream            0%         -          29%      0
        symbolic            0%         -          29%      1
        full (Haiku)       80%       100%         86%      7
        popper             80%       67-80%       57-71%   6

      CRAFTING DOMAIN (15 invented materials, novel vocabulary):
        system            recall    precision  accuracy  rules
        no-dream            0%         -          42%      0
        symbolic           53%        59%         52%      5
        full (Haiku)       63%        63%         58%      21-24
        popper             42%        80%         61%      4

      DreamLog conditions match EX25/EX25b results within rounding.

      Popper rules on family (over-general, missing gender constraints):
        father(X,Y)        :- parent(X,Y).
        mother(X,Y)        :- parent(X,Y).
        grandparent(X,Y)   :- parent(X,V), parent(V,Y).        [correct]
        grandfather(X,Y)   :- parent(X,V), parent(V,Y).        [missing male]
        grandmother(X,Y)   :- parent(X,V), parent(V,Y).        [missing female]
        great_grandparent(X,Y) :- parent(X,V2), parent(V2,V3),
                                  parent(V3,Y).                [correct]

      Hypotheses (set before running):
        H1 (canonical bracket: Popper family recall in [40%, 85%]):
            SUPPORTED. 80% recall, identical to DreamLog full.
        H2 (novel parity: |Popper crafting recall - 50%| <= 15pp):
            SUPPORTED but tight. 42%, 11pp below DreamLog symbolic.
        H3 (data efficiency at 50% holdout): not tested this round.
        Honesty floor: Popper does not outperform DreamLog full on
            either domain.

    implications: |
      The most discriminating finding is on crafting (the novel-vocabulary
      domain): Popper underperforms DreamLog symbolic by 11pp on recall.
      Both systems are pure symbolic learners; the gap argues that
      DreamLog's MDL+anti-unification combination has an inductive bias
      (Plotkin generalization with verification rollback) that random-
      negative ILP doesn't naturally express. The crafting result is
      stronger evidence for the paper's thesis than the family result,
      which is partially attributable to LLM training data familiarity.

      On family, Popper matches DreamLog full's recall (both 80%) but
      loses 33 precision points because random closed-world negatives
      don't enforce the gender constraints. The paper should report this
      as a methodological characterization, NOT as "DreamLog wins":
      with hand-curated near-miss negatives Popper would close the gap.
      The finding is "LLM-supplied semantic priors (male/female ->
      father/mother) substitute for hand-curated negatives, which is
      the practical advantage of the LLM-augmented approach in domains
      where labeled data isn't already curated."

      On crafting, both Popper and DreamLog full produce false positives.
      Popper's 80% precision (4 rules, 2 produce FPs) is HIGHER than
      DreamLog full's 63% (21+ rules, 7-8 produce FPs). The tradeoff:
      Popper is conservative (fewer rules, fewer false positives but
      also fewer true positives), DreamLog full is exploratory (more
      rules cover more ground but with more FPs). Different points on
      the precision-recall frontier; characterize honestly in the paper.

      Cross-system observations:
      - DreamLog symbolic is competitive only on the novel domain
        (53% vs popper's 42%). On the canonical domain it discovers
        only entity-specific rules and gets 0% recall. This confirms
        EX25b's framing: the novel-vocabulary protocol is where the
        symbolic compression story is most defensible.
      - Popper consistency across seeds (42%/42%/42% on crafting) is
        excellent for bootstrap CIs in the paper. DreamLog full has
        slight rule-count variance (21-24) but stable recall/precision;
        the LLM is doing the same conceptual work each time.
      - Excluded `ancestor` target: Popper hangs in clingo C-land past
        the Python-level Settings(timeout=...). EX25 also doesn't
        recover ancestor with DreamLog. Both systems get a pass on
        recursion; neither can claim victory there.

      Removes the only hard pre-submission blocker per the paper
      metadata. Figures remain the soft-blocker; reorganizing
      paper/dreamlog_paper.tex to integrate the EX26 baseline is the
      next paper-side task.

      Followup possibilities (not done this round):
      - H3 holdout sweep: would Popper degrade faster than DreamLog
        open-world as fewer positives are available? The script supports
        --seeds and the converter is holdout-ready.
      - Hand-curated near-miss negatives variant: would close the family
        precision gap and isolate "what does the LLM contribute beyond
        good negatives?" Risks the no-post-hoc-tuning pitfall though.
      - Ancestor with subprocess-level Popper invocation (not Python
        API): would let SIGKILL break the C-land hang and complete the
        recursive case.

  # ================================================================
  # RECURSIVE RULE DISCOVERY (post-submission research spine)
  # ================================================================

  EX27_recursion:
    title: "Recursive (transitive-closure) rule discovery, new-entity protocol"
    date: 2026-06-04
    script: experiments/ex27_recursion.py
    status: complete
    motivation: |
      DreamLog could not discover recursive rules (e.g. ancestor) -- the single
      largest untapped compression opportunity, and the gap EX26 had to exclude
      for both DreamLog and Popper. Operation I detects when a binary predicate
      R is the EXACT transitive closure of another binary predicate B and
      synthesizes the right-recursive definition. EX27 tests whether this
      discovery is genuine (compression-driven) and generalizes to unseen
      entities, using an invented-vocabulary domain (flux_links / flux_reaches)
      to isolate discovery from LLM recall.
    method: |
      New-entity protocol (like EX25/EX25b), NOT holdout: training derived
      facts are the EXACT closure of training base, so Operation I's exact-match
      gate fires; new entities then get base edges only and we check whether the
      discovered recursive rule derives their closure pairs. Four conditions:
      no_dream, symbolic (Operation I, no LLM), full (Operation I +
      recursion-aware Operation G), raw_llm (LLM as inference engine). Canonical
      domain: parent/ancestor over real names. Invented domain:
      flux_links/flux_reaches over invented nodes. Right-recursion only;
      closed-world verification with the bounded evaluator; n_train=8, n_new=4
      (path length well under the evaluator's recursion-depth ceiling ~100).
    key_result: |
      Full four-condition results (new-entity protocol, seed 42, 38 positive
      and 38 negative checks per domain; run 2026-06-04):
        flux (invented):   no_dream 0% | symbolic 100% (prec 100%) |
                           full 100% | raw_llm 0% (TP=0/38)
        family (ancestor): no_dream 0% | symbolic 100% (prec 100%) |
                           full 100% | raw_llm 2.6% (TP=1/38)
      Symbolic compression 0.278 on both; 2 rules discovered. Discovered (flux):
        (flux_reaches X Y) :- (flux_links X Y);
        (flux_reaches X Z) :- (flux_links X Y), (flux_reaches Y Z).
      raw_llm (the LLM as inference engine) essentially fails: 0% on the
      invented vocabulary and 2.6% on real names. So the 100% symbolic result
      cannot be memorization -- this is spec Outcome 1, the strongest form of
      the thesis: compression ALONE discovers recursion on vocabulary the LLM
      never saw. full == symbolic because Operation I fires before Operation G
      (on family, Op G added 2 redundant rules; recall unchanged). LLM cost
      $0.28 (154 Haiku calls) across the raw_llm and full conditions.
    implications: |
      Recursive closure discovery is a clean SYMBOLIC capability, not an LLM
      one: the invented-vocabulary 100% symbolic result shows MDL-driven
      compression recovers an unbounded relation from its finite extension with
      no prior knowledge. This updates the EX26 framing (which recorded that
      neither DreamLog nor Popper recovers ancestor): DreamLog now does, via
      Operation I. Op I is off by default (flag-gated, zero drift). Limitation:
      the exact-match gate (closed-world) means holdout-style partial closures
      are not detected; a subset-match open-world relaxation (EX27c) would be a
      follow-on data-density study. Path length is bounded by the evaluator's
      recursion-depth limit (~100).
    depends_on: [EX25, EX25b, EX26]

  EX28_llm_role_ablation:
    title: "Isolating the LLM's contribution by rule type (structure vs semantics)"
    date: 2026-06-09
    script: experiments/ex28_llm_role.py
    status: complete
    motivation: >
      Replace the paper's weak "full == symbolic" observation with a measured
      claim: symbolic compression recovers structure on any vocabulary, while
      the LLM's value is recall of meaning that evaporates on invented
      predicates. Doubles as the rigorous per-mechanism ablation.
    method: >
      Clean 3x2 (within-predicate / recursive / cross-predicate x canonical /
      fully-invented), four conditions (symbolic-only, LLM-only, full, raw-LLM).
      Metrics: recovery and the correct-rule-proposal rate (structural
      equivalence). Local qwen2.5:3b, high N, resumable with full metadata.
    key_result: |
      Run 2026-06-09, local qwen2.5:3b, n_probe=30, seed 42 (resumable harness,
      full per-run metadata; 536 model calls, $0 real cost as the model is
      local). Recovery (recall) by cell x condition:
                            symbolic  llm_only  full   raw_llm
        within  / canon        1.00     0.00   1.00     0.00
        within  / INVENTED     1.00     0.00   1.00     0.00
        recurse / canon        1.00     0.00   1.00     0.00
        recurse / INVENTED     1.00     0.00   1.00     0.00
        cross   / canon        0.00     0.00   0.00     0.00
        cross   / INVENTED     0.00     0.00   0.00     0.00
      Correct-rule proposal rate (structural equivalence to the target) was
      0.00 in EVERY cell, for both llm_only and full. So:
      (1) Symbolic compression recovers within-predicate AND recursive structure
          at 100% RECALL on BOTH canonical and fully-invented vocabulary
          ("recovery" = recall throughout). Precision differs by rule type:
          recursive is 1.00 (fp=0); within-predicate is 0.67 (fp=1) because Op C
          emits an exception rule pred(X):-guard(X),not(exception(X)), and the
          new-entity protocol adds a new exception (kiwi/vusk) as a guard member
          WITHOUT its exception fact, so the rule over-derives it. That is the
          cost of predicting an unseen exception, not a recovery failure. This
          confirms and extends EX27 (recursion only) to a second rule type, and
          re-confirms vocabulary-independence: the symbolic route uses structure,
          not predicate meaning.
      (2) qwen2.5:3b proposes ZERO structurally-correct rules anywhere, even on
          canonical vocabulary where it has every lexical advantage. Inspected
          failure modes: within-predicate, it echoes the derived FACTS back (raw
          reply for can_fly was [["can_fly","robin"],...], not a rule, so the
          rules-only parser correctly rejects it); cross-predicate (father), it
          proposes ground instances (father(tom,ann):-parent(tom,ann)) or the
          REVERSED direction (parent:-father,male); recursion, it proposes
          nothing. None match the target.
      (3) full == symbolic on every cell: Op G verified-acceptance rejects all of
          qwen's wrong proposals, so the weak LLM adds nothing and causes zero
          drift.
      (4) Cross-predicate is recovered by NO route here: symbolic cannot build a
          cross-functor rule from a fact-only KB, and qwen cannot propose one
          correctly.
      ---
      SONNET ANCHOR (claude-sonnet-4-6, n_probe=30, seed 42; 537 calls, $1.57;
      fail-loud hardened, all calls succeeded). Run on FULLY SYNTHETIC invented
      predicates (vorlan/tessik for recursion, brulit/klanth/dosq for cross: no
      English substring, no semantic hint). A capable LLM changes the picture.
      Recovery (recall), llm_only / full / raw_llm (symbolic stays
      vocabulary-independent: 1.00 within+recursive, 0.00 cross):
                            llm_only  full  raw_llm
        within  / canon        0.00   1.00   0.00
        within  / INVENTED     1.00   1.00   0.00
        recurse / canon        1.00   1.00   1.00
        recurse / INVENTED     1.00   1.00   0.00
        cross   / canon        1.00   1.00   1.00
        cross   / INVENTED     1.00   1.00   0.00
      Proposal rate (llm_only): within/canon 0.00, within/INVENTED 0.53,
      recurse/canon 1.00, recurse/INVENTED 1.00, cross/canon 1.00,
      cross/INVENTED 1.00. Verified proposals:
      - cross/INVENTED: Sonnet proposed (brulit X Y):-(klanth X Y),(dosq X)
        exactly, on meaningless predicates: genuine STRUCTURAL induction from
        fact co-occurrence, not lexical recall (misses were the reversed
        direction).
      - recurse/INVENTED: proposed the full base+step recursive pair on invented
        predicates.
      - within/canon FAILURE (0.00): Sonnet proposed
        (can_fly X):-(bird X),(not(non_flying_bird X)) plus
        (non_flying_bird X):-(bird X),(not(can_fly X)). It KNOWS some birds are
        flightless, so its world knowledge adds an exception predicate that
        (a) misses the bare can_fly:-bird target and (b) is circular
        (unstratified), which the verifier rejects. On invented glonk/zorp it has
        no such knowledge and proposes the clean rule (recovery 1.00).
      The fully-synthetic rename REPRODUCED the rule-induction result (proposal
      and recovery still 1.00 on synthetic vocab for recursion AND cross) and
      removed a lexical confound from the raw-LLM baseline: recurse raw_llm fell
      0.76 -> 0.00 when flux_reaches became tessik, so the "reaches" lexical hint
      had helped pure inference but NEVER rule induction (still 1.00 either way).
      full == 1.00 on ALL SIX cells: the neurosymbolic combination is complete,
      the LLM supplying exactly the cross-predicate rules symbolic compression
      provably cannot build from facts.
    implications: |
      The symbolic half of the division-of-labor thesis is strongly confirmed:
      MDL-driven compression recovers structure (within-predicate generalization
      AND recursive closure) at 100% independent of vocabulary, on predicates the
      model never saw. The LLM half is NOT demonstrable with qwen2.5:3b: the 3B
      model is too weak to induce a single correct rule in this protocol, even on
      canonical vocabulary (father:-parent,male is textbook), so it cannot show
      the recall-of-meaning success on canonical that would contrast with failure
      on invented. This makes the Haiku anchor (deferred, costs money)
      well-motivated and precisely scoped: it must show a stronger model
      proposing cross-predicate rules on CANONICAL vocabulary (where recovery is
      currently 0 for all routes) and failing on INVENTED, isolating LLM recall
      of meaning as the cross-predicate route. With the weak local model the
      ablation cleanly shows the symbolic route carries the entire load and
      full == symbolic. Caveat: 0% proposal on canonical cross-predicate is a
      property of qwen2.5:3b, not evidence against an LLM contribution in general.
      ---
      SONNET ANCHOR revises the thesis (this supersedes the deferred-Haiku plan
      above; we ran Sonnet). The clean "symbolic does structure, LLM does
      meaning" dichotomy is FALSE for a capable model: Sonnet does structure too,
      succeeding on FULLY SYNTHETIC invented recursion (1.00) and cross-predicate
      (1.00) by structural induction from fact patterns, not lexical recall. The
      defensible revised claim is COMPLEMENTARITY, not a structure/meaning split:
      (i) symbolic compression deterministically, verifiably, and for free
      recovers the rule types it can build from extensional facts (within
      generalization, recursive closure) on any vocabulary; (ii) a capable LLM
      additionally reaches cross-predicate rules symbolic compression provably
      cannot build from facts (symbolic cross = 0.00 everywhere), so full = 1.00
      on all six cells; (iii) the invented-vocabulary protocol reveals a double
      edge to LLM world knowledge: it enables cross-predicate semantics but
      SABOTAGES within/canonical (Sonnet 0.00) by importing real-world exceptions
      (flightless birds) the data does not ask for, while invented vocab strips
      that liability (within/INVENTED 1.00). So meaning-recall both helps and
      hurts, and the protocol makes the distinction measurable. Paper action:
      reframe the division-of-labor section from "structure vs meaning" to
      "complementarity plus the double edge of world knowledge"; the qwen run is
      the weak-model baseline, the Sonnet run the capable-model result.
      Methodological notes for the paper (from the final holistic review):
      (a) "recovery" is recall; report within-predicate precision (0.67) and the
      unseen-exception mechanism in key_result point (1). (b) The proposal probe
      scores the LLM on the pre-Op-C KB (full base+derived); in the full
      condition Op G instead sees the post-Op-C KB, so the probe and full-Op-G
      are slightly different tests (both 0 here, so the result is unaffected).
      (c) Two invented predicates use real-ish words (flux, frob); the result is
      unaffected (symbolic is vocabulary-independent and qwen proposed 0
      regardless), but switch to fully synthetic names before final submission to
      make the never-seen-vocabulary claim airtight. (d) qwen's cross-predicate
      error is itself a finding: it proposes the inverted direction
      (parent:-father,male), substituting world-knowledge for KB-inductive
      extraction, a clean illustration of a weak model's failure mode.
    depends_on: [EX25, EX25b, EX27]

  EX29_bits_scale:
    title: "Bits-mode DL favors abstraction as reuse deepens (crossover)"
    date: 2026-06-18
    script: experiments/ex29_bits_scale.py
    status: complete
    motivation: >
      P3b made the bits-based description length rename-invariant (dictionary
      charge = Elias gamma of arity+1 per unique symbol). The decision-diff then
      showed bits mode rejecting 8 of 24 symbolic abstractions that clause-count
      accepts. Test whether bits mode is anti-abstraction or only
      anti-PREMATURE-abstraction: an abstraction reused a few times barely moves
      the symbol-occurrence count, but reused deeply it pays, so the rejections
      should flip to acceptances at a crossover as reuse deepens.
    method: >
      Six sweeps, symbolic only (no LLM), deterministic. (1) Extraction
      analytic: K rules sharing an L-goal body; construct the exact extraction
      proposal and read proposal_delta in bits mode; report crossover K*(L).
      (2) Invention via the dreamer: M structurally identical transitive-closure
      sets. (3) Generalization via the dreamer: a group of N facts under a
      guard. (4) Recursion (Op I) via the dreamer: r = transitive closure of a
      base chain, sweep chain length. (5) Generalization 2D: crossover surface
      over (group size N, #exceptions E). (6) Removal baseline: subsumption and
      pruning always pay. Dream OUTCOMES were cross-checked against recorder
      decisions at each crossover.
    key_result: |
      Run 2026-06-18 (git 9afcdea). Bits mode implements a sharp abstraction-
      maturity threshold; clause-count is blind to it (delta = +1 / "accept"
      for every reuse depth). COMPLETE TAXONOMY of the symbolic ops:
      -- Removal + recursion pay IMMEDIATELY --
      (6) REMOVAL (subsumption -15, pruning -11 bits): always pay (removing a
          clause only lowers DL).
      (4) RECURSION (Op I): pays as soon as valid (chain length >= min_base_facts
          = 3) and the savings grow super-linearly with the closure it deletes:
          L=3 (6 pairs) -33; L=5 -186; L=8 -568; L=10 (55 pairs) -929. No reuse
          threshold: it removes an O(L^2) fact extension for two rules.
      -- Abstraction ops require a reuse threshold (crossover) --
      (1) EXTRACTION crossover K* falls as the shared body L deepens:
          L=2 -> K*=5, L=3 -> 3, L=4 -> 3, L=5 -> 2. delta_bits monotonically
          more negative in both K and L (L=2,K=2 = +15; L=5,K=12 = -330).
      (2) INVENTION (M transitive-closure sets): M=2 no proposal (Op D does not
          fire), M=3 rejected (+15), M>=4 accepted (-16, -49, -83, -118).
          Crossover M*=4. Clause-count accepts every M>=3.
      (3) GENERALIZATION (group of N facts, 1 exception): N=3 rejected (+6),
          N>=4 accepted (-11 down to -413 at N=24). Crossover N*=4.
      (5) GENERALIZATION 2D: the crossover RISES with the exception count E.
          N=4 pays at E=1 (-11) but flips to reject at E=2 (+3) and Op C stops
          firing at E>=3; N=6 pays through E=4 (margin -46 -> -3); N>=8 pays
          comfortably. So generalization compresses when the group is large
          relative to its exceptions.
      Interpretation: the bits-DL gate accepts an abstraction exactly when it
      compresses -- immediately for removal/recursion, and past a reuse
      threshold for extraction/invention/generalization -- which is the
      MDL-correct behavior and a distinction clause-count cannot express. The 8
      decision-diff flips are scenarios sitting below their crossover.
    depends_on: [EX25, EX25b, EX28]

  EX30_bits_surfaces:
    title: "Deeper bits-DL abstraction surfaces (extraction grid, 2-axis invention, scaled KB)"
    date: 2026-06-18
    script: experiments/ex30_bits_surfaces.py
    status: complete
    motivation: >
      EX29 reported a single crossover K*(L) for extraction (L in 2..5) and a
      single M* for invention, but stopped at L=5 and did not explore whether the
      invention crossover shifts with the BASE-RELATION DEPTH, nor whether the
      bits-vs-clauses accept gap changes in a realistic mixed KB. EX30 surfaces
      three finer-grained views: the complete extraction grid, the 2-axis invention
      surface, and the gap dynamics in a KB with both extraction and recursion.
    method: >
      (1) Extraction analytic: build the proposal directly (same EX29 construction)
      for K in 2..12 x L in 2..8 and read delta_bits; report the full grid,
      crossovers K*(L), and slope d(delta_bits)/dK per L. (2) Invention on two
      axes: (a) fix chain_len=3 and sweep M in 2..7 (reproduces EX29 M*=4);
      (b) fix M=4 and sweep chain_len in {2,3,4,6,8} to test whether base-relation
      depth shifts the crossover. (3) Scaled-KB sweep: a mixed KB with K rules
      sharing a 2-goal body (Op E target) plus a transitive-closure relation (Op I
      target); sweep K in {2,3,4,5,6,7,8,12} in both dl_modes with
      discover_recursion=True, recording per-kind accept counts and the
      bits-vs-clauses accept gap. All symbolic, no LLM, deterministic.
    key_result: |
      (1) EXTRACTION GRID: All EX29 crossovers reproduced (L=2->K*5, L=3->K*3,
      L=4->K*3, L=5->K*2). Extended to L=6,7,8: all converge to K*=2 (L=6
      slope=-41.1, L=7=-49.9, L=8=-58.7 bits/rule). Slope monotonically more
      negative with L, confirming deeper shared bodies yield richer payoff per
      additional sharing rule. At K=12: L=2 delta=-61, L=8 delta=-615 bits.

      (2) INVENTION 2-AXIS:
      (a) M sweep (chain_len=3, reproduces EX29): M=2 no proposal (Op D silent),
      M=3 rejected/+15 bits, M>=4 accepted (-16, -49, -83, -118 bits). M*=4 confirmed.
      (b) Chain-length sweep (M=4): M*=4 holds at ALL chain lengths tested (C=2..8).
      Savings DECREASE with deeper chains (C=2: -20, C=3: -16, C=4: -13, C=6: -8,
      C=8: -4 bits). Deeper base relations inflate the symbol table, raising the
      marginal cost of the invented predicate. The crossover M* does not shift with
      chain depth (M*=4 universally at these K=4 base facts), but the savings margin
      narrows -- at C=8, the -4 bits saving is near the detection threshold.

      (3) SCALED-KB SWEEP: Clause-count always rejects extraction (delta_clauses=+1);
      bits mode accepts extraction at the contextual K* which is ~4 (not 5) because
      extra functors in the KB reduce the new-symbol declaration charge. Gap
      (clauses - bits) by K: K=2: 0 (both accept only recursion), K=3: +1 (clauses
      prematurely accepts extraction, bits correctly rejects), K>=4: 0 (both agree,
      abstraction mature). Both modes accept Op I (recursion) uniformly at all K.
      Accept gap is zero at K=2 and K>=4, peaks at +1 at K=3, then collapses as
      abstraction matures past the contextual crossover.
    depends_on: [EX29]

  EX31_default_flip:
    title: "Default-flip evaluation: should dl_mode=bits become the dreamer default?"
    date: 2026-06-18
    script: experiments/ex31_default_flip.py
    status: complete
    motivation: |
      EX29 and EX30 characterize the bits-DL abstraction-maturity threshold but
      do not answer whether bits mode should replace clauses as the DEFAULT for
      KnowledgeBaseDreamer. Three criteria must hold: (i) bits mode never breaks
      correctness, (ii) the compression trade is understood and acceptable, (iii)
      bits mode preserves held-out generalization recovery (the real payoff).
    method: |
      Symbolic only (no LLM), deterministic, seed=42 for holdout splits.
      Reuses the exact scenario set from dl_decision_diff: 1 EX25b crafting +
      6 EX28 domains + 8 bench = 15 scenarios x 2 modes = 30 dream runs.
      Analysis A: dream each scenario in both modes; verify the originally-
      derivable ground facts remain derivable (correctness gate). Also record
      clause/bits counts and accepted-op kinds per mode. Analysis B: compute
      clause-compression and bits-compression ratios for each mode, aggregate
      means to show each mode wins on its own objective. Analysis C: held-out
      generalization (open_world=True) on EX25b crafting and the family tree
      at holdout fractions 0.1/0.2/0.3/0.4; measure recovery and precision
      per mode per fraction. Analysis D: a conservatism probe (guard kept,
      grade held out, group size swept across the crossover) that explains the
      0% recovery -- Op C excepts the held-out items -- and shows recovery is
      mode-independent. Cross-check the accepted-op count difference against
      the decision-diff report (expected 8 flips = clauses-accept, bits-reject).
    key_result: |
      Run 2026-06-18 (git 5da3f05). Recommendation: FLIP.
      (i) CORRECTNESS: IDENTICAL. Bits mode produces zero correctness failures
      across all 15 scenarios / 30 dream runs. The two modes agree on every
      ground fact remaining derivable after compression.
      (ii) COMPRESSION TRADE: Each mode wins on its own objective (expected MDL
      behavior). Mean clause-compression ratio: clauses=0.8335 vs bits=0.8384
      (bits gives up 0.0049 on clause density). Mean bits-compression ratio:
      clauses=0.8767 vs bits=0.8717 (bits saves an extra 0.0050 on the bits
      objective). The trade is symmetric and small: ~0.5pp in each direction.
      Total accepted ops: 24 (clauses mode) vs 16 (bits mode); difference = 8,
      exactly matching the decision-diff report's 8 flips (extraction x3,
      invention x3, generalization x2 -- all scenarios below their reuse
      crossover). Bits mode correctly rejects premature abstractions.
      (iii) GENERALIZATION: Recovery is MODE-INDEPENDENT, 0% for both modes
      across both domains at all holdout fractions (Analysis C), and Analysis D
      explains why: symbolic Op C is conservative -- it records held-out items
      as exceptions (e.g. grade(X,pass):-student(X), not(exception(X)) with the
      held-out students as exception facts), so it never extrapolates to them.
      The DL mode changes only WHETHER the conservative rule forms, never
      recovery; the flip is recovery-NEUTRAL. Genuine held-out recovery needs
      the LLM (Op G), out of scope for this symbolic zero-cost evaluation.
      Precision = 100% in both modes (no spurious derivations).
      VERDICT: FLIP -- bits mode is correctness-safe, trades symmetrically on
      compression objectives (0.5pp each way), and is recovery-neutral. The flip
      rests on correctness + the principle that bits-DL is a more faithful
      Solomonoff/Kolmogorov proxy than clause count, with EX29/EX30 confirming
      bits accepts mature abstractions and rejects only premature ones. The
      default is NOT changed in this experiment; it only records the evidence.
    depends_on: [EX29, EX30]

  EX32_noise_filter:
    title: "Bits-mode description length as a noise filter for generalization"
    date: 2026-06-18
    script: experiments/ex32_noise_filter.py
    status: complete
    motivation: >
      EX29 established a sharp bits-mode crossover: a generalization over a group
      of 3 with one exception costs positive bits (rejected) while a group of 4+
      pays. EX32 tests the practical consequence: random noise creates shallow,
      coincidental patterns that sit below the crossover, so bits mode should
      reject the spurious generalizations clause count accepts -- acting as a
      principled noise filter.
    method: >
      Clean domain of 12 students with a true mature regularity grade(X,pass)
      :- student(X). Noise at fraction f adds L independent fresh-predicate
      groups, each 3 matching facts + 1 exception (the EX29 rejection scenario).
      Sweep f via L in {0..5}; dream in both dl_modes with a decision recorder;
      count true-pattern capture and spurious accepted generalizations. Symbolic,
      deterministic (rng seed recorded). NOTE the noise is inserted before the
      true facts so Op C prices it against a lean symbol table (see caveat).
    key_result: |
      SUPPORTED ONLY IN LEAN/NOISE-FIRST CONTEXT (the headline is an ordering
      artifact; see EX36 and the verification note). In EX32's noise-first
      ordering, clauses mode accepts L spurious generalizations at noise level L
      (precision 1.00 -> 0.17 across L=0..5) while bits mode accepts ZERO
      (precision 1.00); both capture the true pattern (delta_bits -193..-219).
      BUT EX36 shows the filter does NOT survive realistic orderings: with the
      true mature pattern processed first it amortizes not/1 + exception
      declarations, and EVERY noise group is then accepted by bits too (true-first
      100% spurious; interleaved L-1 of L). The reject->accept flip occurs after a
      SINGLE prior exception-bearing accept (k=1): the same N=3 noise proposal
      goes from +5.66 bits (reject) to -2.67 (accept), an ~8.3-bit amortization
      discount that exceeds the rejection margin. Independently re-derived and
      bounded in docs/superpowers/reviews/2026-06-18-ex32-ex33-verification.md.
    implications: >
      The bits-mode "noise filter" is NOT a global property of the objective; it
      is real only while the symbol table is lean (before any exception-bearing
      generalization has fired). The robust, transferable finding is the
      mechanism EX36 isolates: the bits delta is global, so abstraction maturity
      is judged against the current KB state, not in isolation. Paper claims about
      bits-mode selectivity must carry this scope.
    depends_on: [EX29, EX36]

  EX33_compression_predicts:
    title: "Does compression predict generalization? Bits vs clause count"
    date: 2026-06-18
    script: experiments/ex33_compression_predicts.py
    status: complete
    motivation: >
      The paper admits two domains do not establish a predictive relationship
      between compression ratio and generalization recall, and that connecting
      the bits-length margin of an accepted abstraction to its downstream
      generalization value is open. EX33 fills the gap with a family of synthetic
      domains varying in compressibility.
    method: >
      30 synthetic domains in three subfamilies (GOOD+INCOMP, CL_ONLY+INCOMP,
      GOOD+CL_ONLY). Recoverable (new-entity) generalization protocol: dream the
      full KB, then add guard-only entities and test whether the generalization
      rule derives their held-out property. Per domain x mode, record recovery,
      precision, clause/bits compression and savings; compute Spearman and Pearson
      correlations of each compression currency with recovery. Symbolic, no LLM,
      seed recorded.
    key_result: |
      SUPPORTED. Compression strongly predicts generalization: Spearman r in
      [0.59, 0.92] (all p<0.001, N=30 per mode), recovery range 0-100% (mean
      53.8%, matching EX25b's ~53%). Both currencies predict well; clause count is
      marginally better in clauses mode (0.694 vs bits_saved 0.630), and in bits
      mode both are near-identical (~0.91). Bits mode is MORE SELECTIVE (mean
      recovery 42.6% vs clauses 65.1%) and, when it does compress, its metric is a
      stronger predictor (r~0.91 vs ~0.63-0.69). Mode divergence in 10/30 domains
      (all subfamily B).
      CAVEAT (verified, see the EX32/EX33 verification note + EX36): the
      predictive correlation is ROBUST (it survives removing subfamily C: bits_saved
      Spearman ~0.98 on A+B alone). But the "bits MORE SELECTIVE" sub-claim is
      bounded to subfamily B. Subfamily C (mixed GOOD+CL_ONLY) shows the same
      global-DL amortization cross-talk as EX32/EX36: a GOOD group inserted first
      amortizes not/1 + exception declarations, so bits then accepts the CL_ONLY
      groups it rejects in isolation (recovery 100%, not the predicted
      n_good/(n_good+n_cl)). Mode divergence is clean only in subfamily B; a further
      bound is that pure CL_ONLY groups self-amortize at n>=~6 (EX33 stays at n<=4).
    implications: >
      Closes the paper's admitted predictive-relationship gap: compression is a
      robust leading indicator of generalization under both currencies. The
      "bits more selective" reading is real only in lean/isolated context
      (subfamily B); state it with that scope, citing EX36 for the mechanism.
    depends_on: [EX25, EX25b, EX29, EX31, EX36]

  EX34_transfer:
    title: "Cross-domain transfer via merged-KB predicate invention"
    date: 2026-06-18
    script: experiments/ex34_transfer.py
    status: complete
    motivation: >
      Two domains with the same relational skeleton but distinct vocabulary share
      deep structure. Compressing the merged KB should let Op D discover a shared
      invented predicate spanning all domains -- a transfer effect impossible when
      dreaming each domain separately. The rename-invariant bits code was
      hypothesized to favor this shared abstraction.
    method: >
      M domains (M in {2..6}), each a transitive closure (b_k, c_k) over a
      4-entity chain plus a within-domain generalizable tag group. Three
      conditions: SEPARATE (dream each alone, sum compression), MERGED (dream the
      union), and compare. Shared-abstraction detection: an _invented_ functor in
      the merged KB whose wrapper rules span >=2 distinct domain closure heads.
      Both dl_modes. Symbolic, no LLM.
    key_result: |
      Transfer effect CONFIRMED: the merged dream discovers a single shared
      _invented_ predicate covering all M domain closure heads via call/N dispatch
      -- structure the separate dreams cannot produce. Compression is
      super-additive (merged saves more than the sum of separates), peaking at M=6
      with +4 clauses / +192.6 bits.
      HYPOTHESIS REVERSED: bits does NOT favor the shared abstraction earlier; it
      is MORE conservative (shared-invention crossover M*=4 in bits vs M*=3 in
      clauses), exactly consistent with EX29's invention crossover M*=4. At M=3
      bits rejects the shared invention (the new invented-predicate + call/N
      declarations cost more bits than the structure factored away).
    implications: >
      Multi-domain compression is super-additive: merged dreams recover shared
      structure separate dreams miss. The bits gate does not lower the abstraction
      threshold relative to clause count; it consistently requires more reuse
      (more co-domains) before naming shared structure pays. Both modes converge
      for M>=4.
    depends_on: [EX29]

  EX35_opi_density:
    title: "Op I data-density characterization -- the partial-closure gap"
    date: 2026-06-18
    script: experiments/ex35_opi_density.py
    status: complete
    motivation: >
      The paper lists as a limitation that Operation I fires only when the target
      relation is the EXACT transitive closure of a single base relation
      (closed-world exact-match gate), so holdout-style partial closures never
      trigger it. EX35 quantifies the gap: at what completeness does Op I stop
      firing, how does base density interact, and where is the boundary. This is a
      characterization only -- no library change -- and motivates a future
      open-world partial-closure extension.
    method: >
      Three symbolic, deterministic sweeps (sampling seed recorded).
      (1) Completeness: base chain length L in {4,6,8}, fraction p of closure
      pairs in {0.5..1.0}; does Op I fire? (2) Base density: p=1.0, L in {2..10};
      confirm min_base_facts=3 and record delta_clauses/delta_bits growth.
      (3) Over-complete: L=6, p=1.0, add n_spurious in {0..3} false closure facts;
      does Op I abstain?
    key_result: |
      Op I fires under a STRICT exact-match gate: iff p=1.0 AND n_spurious=0 AND
      base_facts>=3. The boundary is a hard cliff, not a gradual falloff. The
      partial-closure gap is total: at L=8 (36 true pairs), p=0.9 leaves 4
      recoverable pairs uncovered, p=0.7 leaves 11, p=0.5 leaves 18 -- a single
      2-clause recursive rule would cover them all. One spurious fact also
      silences Op I. min_base_facts=3 fires exactly at L=3 (delta_bits -33.49);
      bits savings grow super-linearly with L: -33 (L=3), -292 (L=6), -568 (L=8),
      -929 (L=10). (At L=4, p=0.95 fires only because banker's rounding samples
      all 10 pairs; documented via left_on_table=0.)
    implications: >
      Any real corpus with holdout gaps or label noise will never trigger Op I,
      even at 95% completeness. A partial-closure relaxation (subset-match,
      MDL-weighted under an open-world gate) is needed; EX35 gives a concrete
      empirical target for how much recoverable structure the current gate leaves
      behind.
    depends_on: [EX27, EX29]

  EX36_context_effect:
    title: "The global-DL context effect in bits mode"
    date: 2026-06-18
    script: experiments/ex36_context_effect.py
    status: complete
    motivation: >
      EX32 (noise filter) and EX33 (selectivity) both surfaced the same confound:
      the bits-mode delta is GLOBAL -- it depends on the entire symbol table, so an
      earlier accept that amortizes not/1 and exception functors discounts every
      later proposal of the same shape. EX36 turns this confound into a
      characterized property and bounds the EX32/EX33 claims.
    method: >
      Symbolic, deterministic. (A) Order-robustness: EX32's noisy domain (12-student
      true pattern + L noise groups of 3 + 1 exception) built under three insertion
      orderings (noise-first, true-first, interleaved); bits-mode dream with a
      decision recorder; sweep L in {1..5}; count spurious Op C accepts. (B)
      Amortization discount (analytic): the fixed EX29 N=3 proposal (+5.66 bits on a
      lean KB) scored via dl.proposal_delta against KBs already holding k prior
      exception structures, k in {0..4}. (C) scope statement.
    key_result: |
      The EX32 noise filter is an ORDERING ARTIFACT, not a global property.
      (A) Spurious accepts by ordering x L: noise-first 0,0,0,0,0 (EX32);
      true-first 1,2,3,4,5 (every noise group accepted); interleaved 0,1,2,3,4.
      (B) Reject->accept crossover at k=1: the same N=3 proposal goes +5.66 (k=0,
      reject) -> -2.67 (k=1, accept), an 8.33-bit amortization discount when not/1
      first enters the dictionary (subsequent steps add only ~0.5-0.7 bits of log2
      repricing). The 8.3-bit discount exceeds the 5.66-bit rejection margin, so a
      SINGLE prior exception-bearing accept dissolves the filter.
    implications: >
      Bits-mode selectivity holds only while the symbol table is lean (before any
      exception-bearing generalization fires). The robust property is the mechanism
      itself: a two-part MDL code judges abstraction maturity against the current KB
      state, so single-group analyses do not predict multi-group behavior. All
      paper claims about bits-mode noise-filtering / selectivity must carry this
      scope; the EX29 maturity crossovers (single-proposal) remain valid as
      lean-context statements.
    depends_on: [EX29, EX32, EX33]

  EX37_opi_open_world:
    title: "Op I open-world closed-gap sweep"
    date: 2026-06-18
    script: experiments/ex37_opi_open_world.py
    status: complete
    motivation: >
      EX35 showed Op I fires only on EXACT closures (p=1.0); at L=8, p=0.9, four
      recoverable closure pairs are left on the table. Commit 1d0928d added
      open-world partial-closure support (min_closure_coverage=0.5). EX37 re-runs
      the EX35 sweep side-by-side (open_world False vs True) to show the gap closed.
    method: >
      Chain lengths L in {4,6,8}, completeness fractions p in {0.4..1.0}, seed 42.
      Each (L,p) run in both open_world=False (closed-world baseline) and
      open_world=True. Tracks gate_accepted (ClosurePolicy), committed
      (dream.compressed, i.e. survived the final pipeline verify), recovery
      (held-out pairs now derivable), and spurious_count. Symbolic, no LLM.
    key_result: |
      Gap CLOSED at high completeness. Threshold confirmed: the Op I gate fires at
      actual coverage >= tau=0.5 and never below. The paper's key example L=8,p=0.9:
      EX35 left 4 pairs uncovered; EX37 recovers all 4 (recovery=1.0). At every
      COMMITTED point recovery=1.000 and spurious=0 (precision preserved
      unconditionally, as the safety proof predicts).
      KNOWN LIMITATION (honest): at lower completeness with many held-out pairs
      (L=6 p=0.6; L=8 p=0.5/0.6/0.7) the ClosurePolicy gate accepts but the FINAL
      pipeline verification in dream() rolls the whole dream back, because that
      final verify reuses the ORIGINAL unfiltered suite and a held-out closure pair
      sometimes coincides with a synthetic negative. The per-op S- relaxation was
      implemented; the SAME relaxation at the final pipeline verify was not. So
      committed recovery is 38 of 141 gap pairs (27%) -- full at high completeness,
      blocked at low completeness by the final-sweep artifact.
    implications: >
      Open-world Op I closes the partial-closure gap at the practically significant
      high-completeness points and never derives a spurious pair. Completing it
      requires threading accepted-closure predictions into dream()'s final
      verification (mirror ClosurePolicy's S- relaxation there); that is a small,
      well-scoped follow-on the EX37 data motivates.
    depends_on: [EX35]
